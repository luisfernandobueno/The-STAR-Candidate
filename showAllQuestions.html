<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR Candidate</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon"
        href="https://images.vexels.com/media/users/3/136286/isolated/preview/619aebd588e40eb596c3fa768e9dff5e-lightning-bolt-icon.png"
        type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />




    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto">


    <div id="grid-right" class="grid-right flex">
        <div class="flex border mr-auto  mt-3 p-2  rounded-lg  text-xl">
            <div id="screenTitle" class=" flex-1">
                Search
            </div><button id="menu" onclick="toggleSidebar()" class="">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>

        <div><br></div>

        <div onclick="window.location.href='index.html'" class=" flex-1 p-2 border rounded-lg">
            Home
        </div>
    </div>


    <!-- HEADER NAVBAR -->
    <nav id="header" class="px-3 pt-3 flex items-center text-xs">

        <div class="flex-1 ">
            <button id="menu" onclick="toggleSidebar()">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>

        <div id="screenType" class="mr-auto flex-1 text-center text-xl"></div>

        <div class="flex-1 flex justify-end">
            <button id="toggleDeleteAlert_btn" class="open-btn  hiddenBehavior" commandFor="modal-box"
                command="show-modal">


                <span class="material-symbols-outlined">
                    delete_forever
                </span>

            </button>
        </div>
    </nav>

    <aside id="sidebar" class="p-3 border shadow-xl">
        <div class="top mb-1">
            <button id="menu-2" onclick="toggleSidebar()">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>
        <div class="bottom">
            <div id="myFavorite_screen" onclick="goToDisplayAllScreen('Favorites')" class="border rounded-lg mb-1 p-2 ">
                <button class="hiddenBehavior flex-1 flex items-center justify-center">
                    <div class="flex">
                        <span class="material-symbols-outlined flex-1">
                            favorite
                        </span>
                        <p class="flex-1 pl-2">Favorites</p>
                    </div>

                </button>
            </div>

            <div class="flex border rounded-lg p-2">
                <button id="theme-switch">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                        fill="#000000">
                        <path
                            d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                        fill="#000000">
                        <path
                            d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z" />
                    </svg>
                </button>
                <div class="flex-1 mb-1 pl-2">
                    <p>Theme Switch</p>
                </div>

            </div>
        </div>
    </aside>


    <!-- INPUT SEACH AND CATEGORIES -->
    <section id="searchAndCategories" class="p-3 pb-1  rounded-full text-xl">
        <input id="inputSearch" type="search" name="inputSearch" placeholder="What's your question?"
            class=" p-2 rounded-xl border shadow">
    </section>


    <section id="categoriesSection" class="mb-2 mx-3 flex flex-wrap">
        <div id="Recruiter" class="category  px-2 py-1 flex-1 text-center border shadow   rounded-full text-xs ml-auto">
            Recruiter
        </div>
        <div id="Candidate" class="category  px-2 py-1  flex-1 text-center border shadow   rounded-full text-xs ml-1">
            Candidate
        </div>
        <div id="Advice" class="category  px-2 py-1  flex-1 text-center  border shadow  rounded-full text-xs mx-1">
            Advice
        </div>
        <div id="Encouragement"
            class="category  px-2 py-1  flex-1 text-center border shadow  rounded-full text-xs mr-auto">
            Keep It Up
        </div>
    </section>


    <!-- TEXT AREAS TO DISPLAY ALL THE LINKS -->
    <display id="displayAllQuestions" class="content mx-3 mt-0 border shadow rounded-xl p-2">
    </display>

    <div class="grid-left">
        <div>
            <br>
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Profile
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Login
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Register
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Settings
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            About
        </div>
        <div id="toggleDarkMode" onclick="darkmodeState()" class="mb-1 p-2 flex border rounded-lg">

            <button id="theme-switch" class="flex">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    fill="#000000">
                    <path
                        d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    fill="#000000">
                    <path
                        d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z" />
                </svg>
            </button>
            <div class="flex-1">
                Theme Switch
            </div>

        </div>
    </div>

    <!-- FOOTER NAVBAR -->
    <footer class=" rounded-xl  text-xs">

        <div id="navBar" class="flex ">





            <button class="hiddenBehavior flex-1 flex items-center justify-center">
            </button>



            <button id="search_screen" onclick="goToDisplayAllScreen('Search')"
                class="hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">search</span>
            </button>


            <button onclick="window.location.href='index.html'" class=" flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined  p-2 shadow bg-sky-500 rounded-full">home</span>
            </button>

            <button class=" flex-1 flex items-center justify-center">

                <span class="material-symbols-outlined">
                    cards_stack
                </span>

            </button>


            <button class="hiddenBehavior flex-1 flex items-center justify-center">
            </button>


        </div>
    </footer>


    <script src="src/search.js"></script>
</body>

</html>
