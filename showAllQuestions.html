<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR Candidate</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon"
        href="https://images.vexels.com/media/users/3/136286/isolated/preview/619aebd588e40eb596c3fa768e9dff5e-lightning-bolt-icon.png"
        type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto">

    <aside id="grid-left"></aside>


    <!-- HEADER NAVBAR -->
    <nav id="header" class="px-3 pt-3 flex text-xs">
        <div id="screenType" class="mr-auto text-xl">Search</div>
        <div>
            <button>
                <span class="material-symbols-outlined">
                    history_2
                </span>
            </button>
        </div>
    </nav>


    <!-- INPUT SEACH AND CATEGORIES -->
    <section id="" class="p-3 pb-2 rounded-lg text-xl">

        <input id="inputSearch" type="search" name="inputSearch" placeholder="What's your question?"
            class=" p-2 rounded-xl border">


        <section id="categoriesSection" class="mt-2 flex flex-wrap ">
            <div id="Recruiter" class="category  px-2 py-1 flex-1 text-center    rounded-lg text-xs ml-auto">
                Recruiter
            </div>
            <div id="Candidate" class="category  px-2 py-1  flex-1 text-center   rounded-lg text-xs ml-1">
                Candidate
            </div>
            <div id="Advice" class="category  px-2 py-1  flex-1 text-center   rounded-lg text-xs mx-1">
                Advice
            </div>
            <div id="Encouragement" class="category  px-2 py-1  flex-1 text-center  rounded-lg text-xs mr-auto">
                Encouragement
            </div>
        </section>
    </section>


    <!-- TEXT AREAS TO DISPLAY ALL THE LINKS -->
    <display id="displayAllQuestions" class="content mx-3 mt-0 border shadow rounded-xl p-2">
    </display>


    <!-- FOOTER NAVBAR -->
    <footer class=" rounded-xl  text-xs">

        <div id="navBar" class="flex ">
            <button id="arrowBack_btn"
                class="showNextAndPreviousData_btn hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>

            <button onclick="window.location.href = 'showAllQuestions.html'"
                class="hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">search</span>
            </button>

            <button onclick="window.location.href='index.html'" class=" flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined  p-2 shadow bg-sky-500 rounded-full">home</span>
            </button>

            <button id="addNewData_btn"
                class="switchVisibilityOrEditableState hiddenBehavior  flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined ">
                    add
                </span>
            </button>

            <button id="bookmark" onclick="window.location.href = 'showAllQuestions.html'"
                class="hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">bookmark</span>
            </button>

        </div>
    </footer>


    <script src="src/search.js"></script>
</body>

</html>
