<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR Candidate</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon"
        href="https://images.vexels.com/media/users/3/136286/isolated/preview/619aebd588e40eb596c3fa768e9dff5e-lightning-bolt-icon.png"
        type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />




    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto bg-gray-50">


    <div id="grid-right" class="grid-right flex">
        <div class="flex border mr-auto  mt-3 p-2  rounded-lg  text-xl">
            <div id="screenTitle" class=" flex-1">
                Search
            </div><button id="menu" onclick="toggleSidebar()" class="">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>

        <div><br></div>

        <div onclick="window.location.href='index.html'" class=" flex-1 p-2 border rounded-lg">
            Home
        </div>
    </div>


    <!-- HEADER NAVBAR -->
    <nav id="header" class="px-3 pt-3 flex items-center text-xs">

        <div class="flex-1 ">
            <button id="menu" onclick="toggleSidebar()">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>

        <div id="screenType" class="mr-auto flex-1 text-center text-xl"></div>

        <div class="flex-1"></div>
    </nav>

    <aside id="sidebar" class=" p-3 border shadow">
        <div class="top mb-1">
            <button id="menu-2" onclick="toggleSidebar()">
                <span class="material-symbols-outlined">
                    dehaze
                </span>
            </button>
        </div>
        <div class="bottom">
            <div>
                Profile
            </div>
            <div>
                Login
            </div>
            <div>
                Register
            </div>
            <div>
                Settings
            </div>
            <div>
                About
            </div>
        </div>
    </aside>

    <!-- INPUT SEACH AND CATEGORIES -->
    <section id="searchAndCategories" class="p-3 pb-2 rounded-lg text-xl">

        <input id="inputSearch" type="search" name="inputSearch" placeholder="What's your question?"
            class=" p-2 rounded-xl border">
    </section>


    <section id="categoriesSection" class="mb-2 mx-3   flex flex-wrap ">
        <div id="Recruiter" class="category  px-2 py-1 flex-1 text-center    rounded-lg text-xs ml-auto">
            Recruiter
        </div>
        <div id="Candidate" class="category  px-2 py-1  flex-1 text-center   rounded-lg text-xs ml-1">
            Candidate
        </div>
        <div id="Advice" class="category  px-2 py-1  flex-1 text-center   rounded-lg text-xs mx-1">
            Advice
        </div>
        <div id="Encouragement" class="category  px-2 py-1  flex-1 text-center  rounded-lg text-xs mr-auto">
            Keep It Up
        </div>
    </section>


    <!-- TEXT AREAS TO DISPLAY ALL THE LINKS -->
    <display id="displayAllQuestions" class="content mx-3 mt-0 blue-border  rounded-xl p-2">
    </display>

    <div class="grid-left">
        <div>
            <br>
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Profile
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Login
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Register
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Settings
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            About
        </div>
        <div class="mb-1 p-2 border rounded-lg">
            Dark Mode
        </div>
    </div>

    <!-- FOOTER NAVBAR -->
    <footer class=" rounded-xl  text-xs">

        <div id="navBar" class="flex ">






            <button onclick="window.location.href='index.html'" class=" flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined  p-2 shadow bg-sky-500 rounded-full">home</span>
            </button>





        </div>
    </footer>


    <script src="src/search.js"></script>
</body>

</html>
