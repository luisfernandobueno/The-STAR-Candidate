<!DOCTYPE html
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>JIP</title>
    <link rel="icon" href="src/bulb.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto">
    <nav id="header" class="px-3 pt-3 flex text-xs">
        <div id="currentScreenLocation" class=" text-xl">Home</div>
        <div class="ml-auto">
            <button id="toggleDeleteAlert_btn" class="hiddenBehavior" hidden>
                <span id="delete" class="material-symbols-outlined">delete</span>
            </button>
            <button class="switchVisibilityOrEditableState hiddenBehavior">
                <span class="material-symbols-outlined">edit_square </span>
            </button>
        </div>
    </nav>


    


    <!-- ----------------------- DELETE ALERT:
     IT SHOULD BECOME VISIBLE EXCLUSIVELY AFTER PRESSING THE BUTTON "DELETE" WHICH IS INSIDE THE EDIT SECTION EXCLUSIVELY -->

    <section id="deleteData_alert" class="border-solid shadow rounded-xl p-2 text-center" hidden>
        <h1 class="text-xl ">Are you sure you want to delete?</h1>
        <p>This action can not be undone in the future</p>

        <div id="" class="alertDeleteButtons flex text-center">
            <button id="doNotDeleteData_btn" class="hiddenBehavior flex-1 px-4 py-2 rounded-full mr-auto" hidden>
                Cancel
            </button>
            <button id="deleteDataAccepted_btn"
                class="switchVisibilityOrEditableState hiddenBehavior flex-1 bg-red-500 px-4 py-2 rounded-full ml-auto text-red-800"
                hidden>
                Delete
            </button>
        </div>
    </section>





    <section id="areaWhereTheTextIsGonnaBeShown" class="mx-1 p-2 shadow-full rounded-xl bg-fixed">
        <section id="categories" class="flex  ">
            <div id="cat_1" class="category mt-1 px-2 py-1 border-solid shadow  rounded-full text-xs ml-auto">
                Recruiter
            </div>
            <div id="cat_2" class="category mt-1 px-2 py-1 border-solid shadow rounded-full text-xs ml-1">
                Candidate
            </div>
            <div id="cat_3" class="category mt-1 px-2 py-1 border-solid shadow rounded-full text-xs mx-1">
                Advice
            </div>
            <div id="cat_4" class="category mt-1 px-2 py-1 border-solid shadow rounded-full text-xs mr-auto">
                Encouragement
            </div>
        </section>

        <div id="question" class="py-4 font-bold editable border-b text-sky-500 text-xl" contenteditable="false">        </div>
        <div id="explanation" class="pb-4 pt-4 text-sm  editable border-b" contenteditable="false"></div>
        <div id="answer" class="pb-4 pt-4  font-medium editable border-b" contenteditable="false"></div>
        <div id="example" class="pb-4 pt-4 text-s editable" contenteditable="false"></div>
    </section>


    <footer id="navBar" class="border-t ">
        <div class="flex">
            <button id="showPreviousData_btn" class="showNextAndPreviousData_btn hiddenBehavior my-3 flex-1">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <button onclick="window.location.href = 'showAllQuestions.html'" class="hiddenBehavior py-4 flex-1">
                <span class="material-symbols-outlined"> search</span>
            </button>
            <button id="addNewData_btn" class="switchVisibilityOrEditableState hiddenBehavior  flex-1">
                <span class="material-symbols-outlined border shadow p-2 bg-sky-500 rounded-full height: 26px">add</span>
            </button>
            <button id="bookmark"  onclick="window.location.href = 'showAllQuestions.html'" class=" hiddenBehavior flex-1 py-4">
                <span class="material-symbols-outlined">bookmark</span>
            </button>
            <button id="displayTheNextTextOnScreen_btn" class="showNextAndPreviousData_btn hiddenBehavior py-4 flex-1">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>




        <div id="submitSection" class="flex switchVisibilityOrEditableState" hidden>
            <button id="cancelChangesDoNotSubmit_btn"
                class="submitChangesAndCancelChanges hiddenBehavior border m-2 mr-1 px-4 py-2 rounded-full" hidden>
                Cancel
            </button>

            <button id="submitChanges_btn"
                class="submitChangesAndCancelChanges hiddenBehavior border bg-sky-500 m-2 ml-1 px-4 py-2 rounded-full" hidden>
                Save
            </button>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>

</html>
