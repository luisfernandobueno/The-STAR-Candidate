<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <section id="sectionEditableContent">

        <div class="eight-px-separation editable" id="question" contentEditable="false"></div>
        <div class="eight-px-separation editable" id="explanation" contentEditable="false">
        </div>
        <div class="eight-px-separation editable" id="answer" contentEditable="false">
        </div>
        <div class="eight-px-separation editable" id="example" contentEditable="false">
        </div>


        <label for="topic">Category</label>
        <select name="topic" id="topic">
            <option value="Recruiter" selected>Recruiter</option>
            <option value="Advice">Advice</option>
            <option value="Candidate">Candidate</option>
            <option value="Encouragement">Encouragement</option>

        </select>


        
    </section>

    <section id="buttonsHomePage" class="eight-px-separation buttons">
        <button id="showPreviousData_btn" class="">Back</button>
        <button id="showNextData_btn" class="">Next</button>

        <div class="manipulatingInformation">
            <button id="editCurrentInformation_btn">Edit</button>
            <button id="saveChanges_btn" class="saveChangesAndCancelChanges" hidden>
                Save
            </button>
            <button id="cancelChanges_btn" hidden>
                Cancel
            </button>
            <button id="creatingNewData_btn">
                Add New
            </button>
        </div>

        <button id="deleteCurrentInformation_btn">Delete</button>
        <button onclick="window.location.href='showAllQuestions.html'">Search</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
