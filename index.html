<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>JIP</title>
    <link rel="icon" href="src/bulb.png" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <header id="header" class="manipulatingInformation p-2  buttons flex text-xs">
        <div class="">
            <!--             <button id="showPreviousData_btn" class="bg-sky-500 px-4 py-2 rounded-lg text-orange-800">Back</button>
            --> 
            <button id="creatingNewData_btn" class="border px-4 py-2 rounded-lg m-auto">
                Add
            </button>
            <button onclick="window.location.href='showAllQuestions.html'"
                class="border px-4 py-2 rounded-lg m-auto">
                Srch
            </button>
        </div>

        <div class="m-auto"></div>

        <div class=" ">
            <button id="editCurrentInformation_btn" class="border px-4 py-2 rounded-lg text-orange-800 m-auto">
                Edit
            </button>
            <button id="deleteCurrentInformation_btn"
                class="border px-4 py-2 rounded-lg text-orange-800 justify-end">
                Del
            </button>
        </div>

        <div class="manipulatinInformation">
            
        </div>
    </header>


    <section id="sectionEditableContent" class="p-2">
        <div id="question" class="mb-2 p-1 border rounded-lg text-xl editable" contentEditable="false"> </div>
        <div class="mb-2 p-1 border rounded-lg editable" id="explanation" contentEditable="false"></div>
        <div class="mb-2 p-1 border rounded-lg editable" id="answer" contentEditable="false"></div>
        <div class="mb-2 p-1 border rounded-lg editable" id="example" contentEditable="false"></div>

        <label for="topic">Category</label>
        <select name="topic" id="topic">
            <option value="Recruiter" selected>Recruiter</option>
            <option value="Advice">Advice</option>
            <option value="Candidate">Candidate</option>
            <option value="Encouragement">Encouragement</option>
        </select>
    </section>


    <footer id="navBar" class="p-2 border buttons flex text-xs">
        <div class="">
            <button id="showPreviousData_btn" class="bg-sky-500 px-4 py-2 rounded-lg text-orange-800">Back</button>
        </div>

        <div class="m-auto manipulatingInformation">
            <button id="saveChanges_btn" class="bg-sky-500 px-4 py-2 rounded-lg saveChangesAndCancelChanges" hidden>
                Save
            </button>
            <button id="cancelChanges_btn" class="bg-sky-500 px-4 py-2 rounded-lg" hidden>
                Cancel
            </button>
        </div>

        <div class=" ">
            <button id="showNextData_btn" class="bg-sky-500 px-4 py-2 rounded-lg">
                Next
            </button>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>

</html>
