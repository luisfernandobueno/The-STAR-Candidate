<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>JIP</title>
    <link rel="icon"
        href="https://images.vexels.com/media/users/3/136286/isolated/preview/619aebd588e40eb596c3fa768e9dff5e-lightning-bolt-icon.png"
        type="image/x-icon" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto">

    <!-- ----------------------- HEADER NAV BAR: ------------------------>
    <nav id="header" class="mb-3 px-3 pt-3 flex  text-xs">
        <div id="currentScreenLocation" class=" text-xl">Home</div>
        <div class="ml-auto">
            <button id="toggleDeleteAlert_btn" class="hiddenBehavior" hidden>
                <span id="delete" class="material-symbols-outlined">delete</span>
            </button>
            <button id="edit_btn" class="switchVisibilityOrEditableState hiddenBehavior">
                <span class="material-symbols-outlined">edit_square </span>
            </button>
        </div>
    </nav>

    <!-- ----------------------- DELETE ALERT: ------------------------>
    <section id="deleteData_alert" class="border shadow rounded-xl  p-2 text-center" hidden>
        <div class="m-4">

            <h1 class="text-lg ">Are you sure you want to delete?</h1>
            <p class="text-xs">This action can not be undone in the future</p>
        </div>

        <div id="" class="alertDeleteButtons flex text-center">
            <button id="doNotDeleteData_btn" class="hiddenBehavior flex-1 px-4 py-2 rounded-full mr-auto" hidden>
                Cancel
            </button>
            <button id="deleteDataAccepted_btn"
                class="switchVisibilityOrEditableState hiddenBehavior flex-1 bg-red-500 px-4 py-2 rounded-full ml-auto text-red-800"
                hidden>
                Delete
            </button>
        </div>
    </section>

    <!-- ----------------------- CATEGORIES SECTION: ------------------------>
    <section id="categoriesSection" class="mx-2 mb-1 flex flex-wrap">
        <div id="Recruiter" class="category mb-1  px-2 py-1 flex-1 text-center    rounded-lg text-xs ml-auto">
            Recruiter
        </div>
        <div id="Candidate" class="category mb-1  px-2 py-1  flex-1 text-center   rounded-lg text-xs ml-1">
            Candidate
        </div>
        <div id="Advice" class="category mb-1  px-2 py-1  flex-1 text-center   rounded-lg text-xs mx-1">
            Advice
        </div>
        <div id="Encouragement" class="category mb-1  px-2 py-1  flex-1 text-center  rounded-lg text-xs mr-auto">
            Encouragement
        </div>
    </section>

    <!-- ----------------------- EDITABLE TEXT AREAS: ------------------------>
    <section id="areaWhereTheTextIsGonnaBeShown"
        class="mx-2 border rounded-xl p-2        shadow       mx-1 shadow-full rounded-xl bg-fixed">

        <div id="question" class="py-4 pt-3 font-bold editable  text-sky-500 text-xl" contenteditable="false"> </div>
        <div id="explanation" class="pb-4 text-xs editable border-b" contenteditable="false"></div>
        <div id="answer" class="pb-4 pt-4 editable " contenteditable="false"></div>
        <div id="example" class=" text-xs editable" contenteditable="false"></div>
    </section>

    <!-- ----------------------- FOOTER NAV BAR ------------------------>
    <footer class=" rounded-xl">
        
        <div id="navBar" class="flex">
            <button id="showPreviousData_btn"
                class="showNextAndPreviousData_btn hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>

            <button onclick="window.location.href = 'showAllQuestions.html'"
                class="hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">search</span>
            </button>

            <button id="addNewData_btn"
                class="switchVisibilityOrEditableState hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined  p-2 bg-sky-500 rounded-full">
                    add
                </span>
            </button>

            <button id="bookmark" onclick="window.location.href = 'showAllQuestions.html'"
                class="hiddenBehavior flex-1  flex items-center justify-center">
                <span class="material-symbols-outlined">bookmark</span>
            </button>

            <button id="displayTheNextTextOnScreen_btn"
                class="showNextAndPreviousData_btn hiddenBehavior  flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>




        <div id="submitSection" class="flex switchVisibilityOrEditableState" hidden>
            <button id="cancelChangesDoNotSubmit_btn"
                class="submitChangesAndCancelChanges hiddenBehavior " hidden>
                Cancel
            </button>

            <button id="submitChanges_btn"
                class="submitChangesAndCancelChanges hiddenBehavior border shadow bg-sky-500  px-4 py-2 rounded-full"
                hidden>
                Save
            </button>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>

</html>
