<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>JIP</title>
    <link rel="icon" href="src/bulb.png" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto border-solid rounded-lg">
    <header id="header" class="p-2  buttons flex text-xs">
        <div class="">

            <button id="addNewData_btnHeader"
                class="switchVisibilityOrEditableState toggleable border-solid px-4 py-2 rounded-lg m-auto">
                +New
            </button>
            <button onclick="window.location.href='showAllQuestions.html'"
                class="toggleable border-solid px-4 py-2 rounded-lg m-auto">
                Srch
            </button>
        </div>

        <div class="m-auto"> </div>

        <div id="editOrDelete">

            <button id="toggleDeleteAlert_btn"
                class="toggleable border-solid px-4 py-2 rounded-lg text-orange-800 justify-end" hidden>
                Del
            </button>
            <button id="editCurrentData_btn"
                class="switchVisibilityOrEditableState toggleable border-solid px-4 py-2 rounded-lg text-orange-800 m-auto">
                Edit
            </button>

        </div>
    </header>






    <!-- ----------------------- DELETE ALERT:
     IT SHOULD BECOME VISIBLE EXCLUSIVELY AFTER PRESSING THE BUTTON "DELETE" WHICH IS INSIDE THE EDIT SECTION EXCLUSIVELY -->


    <section id="deleteData_alert" class=" border-solid rounded-lg p-2 text-center" hidden>

        <h1 class="text-xl">Are you sure you want to delete?</h1>
        <p>This action can not be undone in the future</p>

        <div id="" class="alertDeleteButtons flex  text-center">
            <button id="deleteDataAccepted_btn"
                class="switchVisibilityOrEditableState flex-1 bg-sky-500 px-4 py-2 rounded-lg ml-auto text-red-800"
                hidden>
                Delete
            </button>
            <button id="doNotDeleteData_btn" class=" flex-1 bg-sky-500 px-4 py-2 rounded-lg mr-auto" hidden>
                Cancel
            </button>
        </div>
    </section>








    <section id="areaWhereTheTextIsGonnaBeShown" class="m-2 mt-0 p-2 border-solid rounded-lg bg-fixed">

        <section id="categories" class="flex pt-1 pb-2 rounded-lg">
            <div class="border-solid rounded-lg text-xs m-1 p-1 ml-auto">Recruiter</div>
            <div class="border-solid rounded-lg text-xs  m-1 p-1">Candidate</div>
            <div class="border-solid rounded-lg text-xs  m-1 p-1">Advice</div>
            <div class="border-solid rounded-lg text-xs  m-1 p-1 mr-auto">Encouragement</div>
        </section>


        <div id="question" class="pb-4 pt-4 text-xl editable border-b" contentEditable="false"></div>
        <div id="explanation" class="pb-4 pt-4 text-xs editable border-b" contentEditable="false"></div>
        <div id="answer" class="pb-4 pt-4 text-sm editable border-b" contentEditable="false"></div>
        <div id="example" class="pb-4 pt-4 text-xs editable" contentEditable="false"></div>

    </section>







    <footer id="navBar" class="p-2 mb-1 buttons flex text-xs">
        <div class="">
            <button id="showPreviousData_btn"
                class="showNextAndPreviousData_btn border-solid  bg-sky-500 px-4 py-2 rounded-lg text-orange-800">
                Back
            </button>
        </div>

        <div id="submitSection" class="m-auto switchVisibilityOrEditableState">
            <button id="submitChanges_btn"
                class="submitChangesAndCancelChanges border-solid bg-sky-500 px-4 py-2 rounded-lg " hidden>
                Save
            </button>
            <button id="cancelChangesDoNotSumbit_btn"
                class="submitChangesAndCancelChanges border-solid bg-sky-500 px-4 py-2 rounded-lg" hidden>
                Cancel
            </button>
        </div>

        <div class=" ">
            <button id="displayTheNextTextOnScreen_btn"
                class="showNextAndPreviousData_btn border-solid bg-sky-500 px-4 py-2 rounded-lg">
                Next
            </button>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>

</html>
