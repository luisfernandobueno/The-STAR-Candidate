<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/stylingButtons.css">
    <link rel="stylesheet" href="src/style.css" />
    <title>STAR Candidate</title>
    <link rel="icon"
        href="https://images.vexels.com/media/users/3/136286/isolated/preview/619aebd588e40eb596c3fa768e9dff5e-lightning-bolt-icon.png"
        type="image/x-icon" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-auto">

    <aside class="m-2 mr-0 p-2 border rounded-lg">
        <div class="top">

        </div>
        <div class="bottom">
            <div>
                AAAA
            </div>
            <div>
                BBB
            </div>
            <div>
                CCC
            </div>
            <div>
                DDD
            </div>
            <div>
                EEE
            </div>
        </div>
    </aside>
    <!-- ----------------------- HEADER NAV BAR: ------------------------>
    <nav id="header" class="mb-3 px-3 pt-3 flex text-xs">

        <div id="currentScreenLocation" class="mr-auto text-xl">Home</div>

        <div class=" rounded-full">
            <button id="edit_btn" class="switchVisibilityOrEditableState hiddenBehavior">
                <span class="material-symbols-outlined">edit_square </span>
            </button>
            <button id="toggleDeleteAlert_btn" class="open-btn hiddenBehavior" hidden commandFor="modal-box"
                command="show-modal"><span id="delete" class="material-symbols-outlined">delete</span>
            </button>
            <button>
                <span class="material-symbols-outlined">
                    favorite
                </span>
                <span class="material-symbols-outlined" hidden>
                    heart_check
                </span>
            </button>

        </div>
    </nav>

    <!-- BUTTONS FOR STYING -->
    <section id="stylingButtonsSection" class="m-auto   section-1 hidden">


        <div id="format-buttons" class="format-buttons mb-1 flex flex-wrap content-center">

            <div class="flex1 flex-1 ">

                <!-- Updated buttons with symbols -->
                <button class="circleButton content-center" onclick="formatText('bold')">
                    <span class="material-symbols-rounded p-0">
                        format_bold
                    </span>
                </button>
                <button class="circleButton" onclick="formatText('strikethrough')">
                    <span class="material-symbols-rounded p-0">
                        strikethrough_s
                    </span>
                </button>
                <button class="circleButton" onclick="formatText('italic')">
                    <span class="material-symbols-rounded p-0">
                        format_italic
                    </span>
                </button>
                <button class="circleButton" onclick="formatText('underline')">
                    <span class="material-symbols-rounded p-0">
                        format_underlined
                    </span>
                </button>
            </div>


            <div id="highlightContainer" class="flex2 flex-2 align-center ">


                <button class="highlight-button" style="background-color:#80E0FF"
                    onclick="highlightText('#80E0FF', this)"></button>

                <button class="highlight-button" style="background-color:#B9FBC0"
                    onclick="highlightText('#B9FBC0', this)"></button>

                <button class="highlight-button" style="background-color:#FFDAB3"
                    onclick="highlightText('#FFDAB3', this)"></button>

                <button class="highlight-button" style="background-color:#E7D0FF"
                    onclick="highlightText('#E7D0FF', this)"></button>
            </div>

            <div class="flex3 flex-3  ">

                <span onclick="removeHighlight()" class="material-symbols-rounded removeStyle content-center ">
                    ink_eraser_off
                </span>

            </div>

        </div>



    </section>

    <!-- ----------------------- DELETE ALERT: ------------------------>

    <dialog id="modal-box" class="modal border shadow rounded-xl  p-2 text-center">
        <!-- <button class="close-btn" commandFor="modal-box" command="close">&times;</button> -->
        <div class="m-4">

            <h1 class="text-lg ">Are you sure you want to delete?</h1>
            <p class="text-xs">This action can not be undone in the future</p>
        </div>

        <div id="" class="alertDeleteButtons flex text-center">
            <button id="doNotDeleteData_btn" class="hiddenBehavior flex-1 px-4 py-2 rounded-full mr-auto close-btn"
                commandFor="modal-box" command="close" hidden>
                Cancel
            </button>
            <button id="deleteDataAccepted_btn"
                class="switchVisibilityOrEditableState hiddenBehavior flex-1 bg-red-500 px-4 py-2 rounded-full ml-auto text-red-800  close-btn"
                commandFor="modal-box" command="close" hidden>
                Delete
            </button>
        </div>
    </dialog>

    <!-- ADD OTHER ALERTS LIKE THIS FOR WHEN DATA GET SUCCESFULLY UPDATED -->


    <!-- ----------------------- CATEGORIES SECTION: ------------------------>
    <section id="categoriesSection" class="mx-3 mb-1 flex flex-wrap">
        <div id="Recruiter" class="category mb-1  px-2 py-1 flex-1 text-center    rounded-lg text-xs ml-auto">
            Recruiter
        </div>
        <div id="Candidate" class="category mb-1  px-2 py-1  flex-1 text-center   rounded-lg text-xs ml-1">
            Candidate
        </div>
        <div id="Advice" class="category mb-1  px-2 py-1  flex-1 text-center   rounded-lg text-xs mx-1">
            Advice
        </div>
        <div id="Encouragement" class="category mb-1  px-2 py-1  flex-1 text-center  rounded-lg text-xs mr-auto">
            Encouragement
        </div>
    </section>

    <!-- ----------------------- EDITABLE TEXT AREAS: ------------------------>
    <section id="areaWhereTheTextIsGonnaBeShown" class="content mx-3 border shadow rounded-xl p-1  rounded-xl bg-fixed">

        <div id="question" class=" px-1 py-3 pt-2 font-bold editable  text-sky-500 text-xl" contenteditable="false">
            Question</div>
        <div id="explanation" class="px-1 py-2 text-xs editable border-b" contenteditable="false"> Explanation</div>
        <div id="answer" class="px-1 py-3 editable" contenteditable="false">Answer</div>
        <div id="example" class="px-1 py-2 text-xs editable" contenteditable="false">Example</div>
    </section>

    <!-- ----------------------- FOOTER NAV BAR ------------------------>
    <footer class=" rounded-xl">

        <div id="navBar" class="flex">
            <button id="arrowBack_btn"
                class="showNextAndPreviousData_btn hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>

            <button onclick="goToDisplayAllScreen('simpleSearch')"
                class="hiddenBehavior flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">search</span>
            </button>

            <button id="addNewData_btn"
                class="switchVisibilityOrEditableState hiddenBehavior  flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined shadow p-2 bg-sky-500 rounded-full">
                    add
                </span>
            </button>

            <button id="history_btn" onclick="goToDisplayAllScreen('history')"
                class="hiddenBehavior flex-1  flex items-center justify-center">
                <span class="material-symbols-outlined">
                    history_2
                </span>
            </button>

            <button id="arrowForward_btn"
                class="showNextAndPreviousData_btn hiddenBehavior  flex-1 flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>




        <div id="submitSection" class="flex switchVisibilityOrEditableState" hidden>
            <button id="cancelChangesDoNotSubmit_btn" class="submitChangesAndCancelChanges hiddenBehavior " hidden>
                Cancel
            </button>

            <button id="submitChanges_btn"
                class="submitChangesAndCancelChanges hiddenBehavior border bg-sky-500  px-4 py-2 rounded-full" hidden>
                Save
            </button>
        </div>
    </footer>

    <div class="grid-right"></div>

    <script src="src/stylingButtons.js"></script>
    <script src="src/script.js"></script>
</body>

</html>
