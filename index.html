<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <section id="sectionEditableContent" class="p-2">

        <div id="question" class="mb-2 p-1 eight-px-separation rounded-lg text-xl editable" contentEditable="false">
        </div>
        <div class="mb-2 p-1 eight-px-separation rounded-lg editable" id="explanation" contentEditable="false">
        </div>
        <div class="mb-2 p-1 eight-px-separation rounded-lg editable" id="answer" contentEditable="false">
        </div>
        <div class="mb-2 p-1 eight-px-separation rounded-lg editable" id="example" contentEditable="false">
        </div>


        <label for="topic">Category</label>
        <select name="topic" id="topic">
            <option value="Recruiter" selected>Recruiter</option>
            <option value="Advice">Advice</option>
            <option value="Candidate">Candidate</option>
            <option value="Encouragement">Encouragement</option>
        </select>

    </section>


    <section id="buttonsHomePage" class="p-2 eight-px-separation buttons">

        <div>

            <button id="showPreviousData_btn" class="bg-sky-500 px-4 py-2 rounded-lg text-orange-800">Back</button>
            <button id="showNextData_btn" class="bg-sky-500 px-4 py-2 rounded-lg">Next</button>
        </div>


        <div class="m-auto manipulatingInformation">
            <button id="editCurrentInformation_btn"
                class="bg-sky-500 px-4 py-2 rounded-lg text-orange-800">
                Edit
            </button>
            <button id="saveChanges_btn" class="bg-sky-500 px-4 py-2 rounded-lg saveChangesAndCancelChanges" hidden>
                Save
            </button>
            <button id="cancelChanges_btn" class="bg-sky-500 px-4 py-2 rounded-lg" hidden>
                Cancel
            </button>
            <button id="creatingNewData_btn" class="bg-sky-500 px-4 py-2 rounded-lg">
                Add New
            </button>
        </div>

        <div>

            <button id="deleteCurrentInformation_btn"
                class="bg-sky-500 px-4 py-2 rounded-lg text-orange-800">Delete</button>
            <button onclick="window.location.href='showAllQuestions.html'"
                class="bg-sky-500 px-4 py-2 rounded-lg">Search</button>
        </div>


    </section>

    <script src="script.js"></script>
</body>

</html>
