<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <section id="sectionEditableContent">

        <div class="eight-px-separation editable" id="question" contentEditable="false"></div>
        <div class="eight-px-separation editable" id="explanation" contentEditable="false">
        </div>
        <div class="bg-sky-500 eight-px-separation text-xl editable" id="answer" contentEditable="false">
        </div>
        <div class="eight-px-separation editable" id="example" contentEditable="false">
        </div>


        <label for="topic">Category</label>
        <select name="topic" id="topic">
            <option value="Recruiter" selected>Recruiter</option>
            <option value="Advice">Advice</option>
            <option value="Candidate">Candidate</option>
            <option value="Encouragement">Encouragement</option>

        </select>


        
    </section>

    <section id="buttonsHomePage" class="eight-px-separation buttons">
        <button id="showPreviousData_btn" class="bg-sky-500 px-4 text-orange-800">Back</button>
        <button id="showNextData_btn" class="bg-sky-500 px-4">Next</button>

        <div class="manipulatingInformation">
            <button id="editCurrentInformation_btn" class="bg-sky-500 px-4 rounded-full text-orange-800">Edit</button>
            <button id="saveChanges_btn" class="bg-sky-500 px-4 saveChangesAndCancelChanges" hidden>
                Save
            </button>
            <button id="cancelChanges_btn" class="bg-sky-500 px-4" hidden>
                Cancel
            </button>
            <button id="creatingNewData_btn" class="bg-sky-500 px-4">
                Add New
            </button>
        </div>

        <button id="deleteCurrentInformation_btn"  class="bg-sky-500 px-4 text-orange-800">Delete</button>
        <button onclick="window.location.href='showAllQuestions.html'"  class="bg-sky-500 px-4">Search</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
